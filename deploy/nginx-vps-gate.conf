# Multi-app VPS: gate page on /, apps on their own ports (3001, 3002, 4000).
# Replace YOUR_DOMAIN_OR_IP with 185.214.134.41 or your domain.
server {
    listen 80;
    server_name YOUR_DOMAIN_OR_IP;

    client_max_body_size 25M;

    # Gate / launcher (static files)
    root /var/www/gate-portal;
    index index.html;

    location = / {
        try_files /index.html =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}

